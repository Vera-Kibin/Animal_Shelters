name: Deploy z hasłem
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run build

      - name: Zaszyfruj hasłem
        run: |
          npx staticrypt dist/index.html \
            --in-place \
            -p "${{ secrets.PREVIEW_PASSWORD }}" \
            --short

          echo "==== sprawdzam wynik ===="
          head -20 dist/index.html

      - name: Publikuj na GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
